# Beta image from Docker Hub: jms1717/8mblocal:beta
# Build & push (maintainer): see comments at bottom of docker-compose.yml or README.
# Server: copy this file + .env, then: docker compose -f docker-compose.beta.yml pull && docker compose -f docker-compose.beta.yml up -d
#
# Port 8002 avoids clashing with a stable container on 8001. Change if needed.
services:
  8mblocal:
    image: jms1717/8mblocal:beta
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "beta"
    container_name: 8mblocal-beta
    ports:
      - "8002:8001"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - type: bind
        source: ./.env
        target: /app/.env
        bind:
          create_host_path: false
    gpus: all
    environment:
      - REDIS_URL=redis://127.0.0.1:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
    restart: unless-stopped
